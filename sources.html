<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Sources - The Historical Loop</title>
    <link rel="stylesheet" href="https://altsumkanews.github.io/historyproje/assets/css/style.css?v=a0ba884548820066dfadd8416036abba">
    
    <style>
        :root {
            --ua-blue: #0057b7;
            --ua-gold: #ffd700;
            --accent-red: #ce1212;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
        }

        body {
            background: linear-gradient(to bottom, #121212, #1a1a1a);
            color: var(--text-main);
            line-height: 1.6;
        }

        .custom-wrapper { max-width: 900px; margin: 0 auto; padding: 40px 20px; }

        .control-panel { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin: 20px 0 30px; }
        
        .lang-switcher { display: flex; gap: 5px; background: rgba(255,255,255,0.05); padding: 5px; border-radius: 50px; border: 1px solid #333; }
        .lang-trigger { border: none; padding: 8px 16px; border-radius: 30px; cursor: pointer; font-weight: 700; background: transparent; color: white; transition: 0.3s; }
        .lang-trigger.active { background: var(--ua-gold); color: #000; }

        /* Search Bar */
        .search-container { width: 100%; max-width: 400px; position: relative; }
        #sourceSearch { width: 100%; padding: 12px 20px; border-radius: 25px; border: 1px solid #444; background: #252525; color: white; outline: none; transition: 0.3s; }
        #sourceSearch:focus { border-color: var(--ua-gold); box-shadow: 0 0 10px rgba(255, 215, 0, 0.2); }

        .sources-card {
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 { font-size: 2.5em; font-weight: 900; margin-bottom: 10px; text-align: center; color: #fff; }
        h2 { color: var(--ua-gold); border-bottom: 1px solid #444; padding-bottom: 10px; margin-top: 30px; font-size: 1.4em; }

        .source-list { list-style: none; padding: 0; }
        .source-list li { margin: 15px 0; padding: 10px 10px 10px 35px; position: relative; border-radius: 10px; transition: 0.3s; }
        .source-list li::before { content: '→'; position: absolute; left: 10px; color: var(--accent-red); font-weight: bold; }
        .source-list li:hover { background: rgba(255,255,255,0.05); }
        .source-list li.highlight-random { background: rgba(255, 215, 0, 0.15); border: 1px solid var(--ua-gold); transform: scale(1.02); }
        
        .source-list a { color: var(--text-main); text-decoration: none; transition: 0.3s; font-weight: 500; }
        .source-list a:hover { color: var(--ua-gold); }

        .btn-random { background: var(--accent-red); color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: 600; transition: 0.3s; margin-top: 20px; display: block; margin-left: auto; margin-right: auto; }
        .btn-random:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(206, 18, 18, 0.4); }

        .methodology-box { background: rgba(206, 18, 18, 0.05); border-left: 4px solid var(--accent-red); padding: 25px; border-radius: 0 15px 15px 0; margin-top: 40px; }
        .footer-note { font-size: 0.85em; color: #777; margin-top: 40px; text-align: center; font-style: italic; }

        /* Navbar */
        .top { padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; background: rgba(18,18,18,0.95); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #333; }
        .logo { font-weight: 900; text-decoration: none; color: #fff; font-size: 1.3em; }
        .navbar__menu { display: flex; list-style: none; padding: 0; margin: 0; }
        .navbar__menu a { color: #fff; text-decoration: none; margin-left: 20px; font-weight: 600; font-size: 0.9em; transition: 0.3s; }
        .navbar__menu a:hover { color: var(--ua-gold); }
    </style>
</head>

<body>
    <header class="top">
        <a class="logo" href="index.html">History Project</a>
        <nav class="navbar">
            <ul class="navbar__menu">
                <li><a href="index.html" id="nav-home">Головна</a></li>
                <li><a href="https://altsumkanews.github.io/historyproje/vstup-viyna-yak-istorichne-yavishche.html" id="nav-intro">Вступ</a></li>
            </ul>
        </nav>
    </header>

    <main class="custom-wrapper">
        <h1 id="main-title">Використані джерела</h1>
        
        <div class="control-panel">
            <div class="lang-switcher">
                <button class="lang-trigger active" onclick="updateLang('ua', this)">🇺🇦 UA</button>
                <button class="lang-trigger" onclick="updateLang('en', this)">🇬🇧 EN</button>
                <button class="lang-trigger" onclick="updateLang('de', this)">🇩🇪 DE</button>
            </div>
            <div class="search-container">
                <input type="text" id="sourceSearch" onkeyup="searchSources()" placeholder="Пошук джерела...">
            </div>
        </div>

        <section class="sources-card">
            <h2 id="sec-intl">Міжнародні дослідження та ресурси</h2>
            <ul class="source-list" id="list-intl"></ul>

            <h2 id="sec-ua">Українські історичні ресурси</h2>
            <ul class="source-list" id="list-ua"></ul>

            <h2 id="sec-docs">Офіційні документи</h2>
            <ul class="source-list" id="list-docs"></ul>

            <button class="btn-random" id="btn-random" onclick="highlightRandom()">✨ Випадкове джерело</button>
        </section>

        <section class="methodology-box" id="methodology">
            <h3 id="meth-title" style="margin-top: 0; color: #fff;">Методологія та дослідження</h3>
            <p id="meth-desc"></p>
            <ul id="meth-list" style="color: #bbb; padding-left: 20px;"></ul>
            <p id="meth-footer" style="margin-bottom: 0; font-size: 0.95em;"></p>
        </section>

        <footer class="footer-note" id="footer-text"></footer>
    </main>

    <script>
        const db = {
            ua: {
                navHome: "Головна", navIntro: "Вступ", title: "Використані джерела",
                secIntl: "Міжнародні дослідження та ресурси", secUa: "Українські історичні ресурси",
                secDocs: "Офіційні документи", methTitle: "Методологія та дослідження",
                methDesc: "В межах проєкту проведено опитування серед студентів провідних ВНЗ:",
                methUni: ["КНУ імені Тараса Шевченка", "ЛНУ імені Івана Франка"],
                methFooter: "Результати підтверджують тяглість імперської політики Росії.",
                footer: "Матеріали адаптовані за допомогою DeepL та Google Gemini.",
                searchPlaceholder: "Пошук джерела...",
                btnRandom: "✨ Випадкове джерело",
                intlLinks: [
                    {n: "Yale University: The Making of Modern Ukraine (Timothy Snyder)", u: "https://online.yale.edu/courses/making-modern-ukraine"},
                    {n: "Encyclopedia Britannica: History of Ukraine", u: "https://www.britannica.com/place/Ukraine/History"},
                    {n: "Atlantic Council: UkraineAlert (Аналітика)", u: "https://www.atlanticcouncil.org/blogs/ukrainealert/"},
                    {n: "BBC: Ukraine's history explained", u: "https://www.bbc.com/news/world-europe-18010123"},
                    {n: "Вікіпедія: Історія України (Глобальна)", u: "https://en.wikipedia.org/wiki/History_of_Ukraine"}
                ],
                uaLinks: [
                    {n: "Інститут історії України НАН України", u: "http://history.org.ua/uk"},
                    {n: "Український інститут національної пам'яті", u: "https://uinp.gov.ua/"},
                    {n: "Проєкт «Локальна історія»", u: "https://localhistory.org.ua/"},
                    {n: "Електронна бібліотека «Діаспоріана»", u: "https://diasporiana.org.ua/"}
                ],
                docLinks: [
                    {n: "Державна архівна служба України", u: "https://archives.gov.ua/"},
                    {n: "Ukraine.ua: Офіційна історія (МЗС)", u: "https://ukraine.ua/visit/history-of-ukraine/"}
                ]
            },
            en: {
                navHome: "Home", navIntro: "Introduction", title: "Sources Used",
                secIntl: "International Resources", secUa: "Ukrainian Historical Resources",
                secDocs: "Official Documents", methTitle: "Methodology & Research",
                methDesc: "The project included a survey among students of leading universities:",
                methUni: ["Taras Shevchenko National University", "Ivan Franko National University"],
                methFooter: "Results confirm the continuity of Russia's imperial policy.",
                footer: "Materials adapted using DeepL and Google Gemini.",
                searchPlaceholder: "Search source...",
                btnRandom: "✨ Random Source",
                intlLinks: [
                    {n: "Yale University: The Making of Modern Ukraine (Timothy Snyder)", u: "https://online.yale.edu/courses/making-modern-ukraine"},
                    {n: "Encyclopedia Britannica: History of Ukraine", u: "https://www.britannica.com/place/Ukraine/History"},
                    {n: "Atlantic Council: UkraineAlert (Analytics)", u: "https://www.atlanticcouncil.org/blogs/ukrainealert/"},
                    {n: "BBC: Ukraine's history explained", u: "https://www.bbc.com/news/world-europe-18010123"},
                    {n: "Wikipedia: History of Ukraine (Global Edition)", u: "https://en.wikipedia.org/wiki/History_of_Ukraine"}
                ],
                uaLinks: [
                    {n: "Institute of History of Ukraine, NASU", u: "http://history.org.ua/uk"},
                    {n: "Ukrainian Institute of National Remembrance", u: "https://uinp.gov.ua/"},
                    {n: "Local History Project", u: "https://localhistory.org.ua/"},
                    {n: "Electronic Library 'Diasporiana'", u: "https://diasporiana.org.ua/"}
                ],
                docLinks: [
                    {n: "State Archival Service of Ukraine", u: "https://archives.gov.ua/"},
                    {n: "Ukraine.ua: Official History (MFA)", u: "https://ukraine.ua/visit/history-of-ukraine/"}
                ]
            },
            de: {
                navHome: "Startseite", navIntro: "Einleitung", title: "Quellen",
                secIntl: "Internationale Ressourcen", secUa: "Ukrainische historische Ressourcen",
                secDocs: "Offizielle Dokumente", methTitle: "Methodik & Forschung",
                methDesc: "Umfrage unter Studenten führender Universitäten:",
                methUni: ["T.-Schewtschenko-Universität Kiew", "I.-Franko-Universität Lwiw"],
                methFooter: "Ergebnisse bestätigen die Kontinuität der imperialen Politik Russlands.",
                footer: "Übersetzt mit DeepL und Google Gemini.",
                searchPlaceholder: "Quelle suchen...",
                btnRandom: "✨ Zufällige Quelle",
                intlLinks: [
                    {n: "Yale University: The Making of Modern Ukraine (Timothy Snyder)", u: "https://online.yale.edu/courses/making-modern-ukraine"},
                    {n: "Encyclopedia Britannica: Geschichte der Ukraine", u: "https://www.britannica.com/place/Ukraine/History"},
                    {n: "Atlantic Council: UkraineAlert", u: "https://www.atlanticcouncil.org/blogs/ukrainealert/"},
                    {n: "BBC: Ukraine's history explained", u: "https://www.bbc.com/news/world-europe-18010123"},
                    {n: "Wikipedia: Geschichte der Ukraine", u: "https://de.wikipedia.org/wiki/Geschichte_der_Ukraine"}
                ],
                uaLinks: [
                    {n: "Institut für Geschichte der Ukraine", u: "http://history.org.ua/uk"},
                    {n: "Ukrainisches Institut für nationales Gedenken", u: "https://uinp.gov.ua/"},
                    {n: "Projekt 'Lokale Geschichte'", u: "https://localhistory.org.ua/"},
                    {n: "Bibliothek 'Diasporiana'", u: "https://diasporiana.org.ua/"}
                ],
                docLinks: [
                    {n: "Staatlicher Archivdienst der Ukraine", u: "https://archives.gov.ua/"},
                    {n: "Ukraine.ua: Offizielle Geschichte (MFA)", u: "https://ukraine.ua/visit/history-of-ukraine/"}
                ]
            }
        };

        function updateLang(l, b) {
            document.querySelectorAll('.lang-trigger').forEach(x => x.classList.remove('active'));
            b.classList.add('active');

            document.getElementById('nav-home').innerText = db[l].navHome;
            document.getElementById('nav-intro').innerText = db[l].navIntro;
            document.getElementById('main-title').innerText = db[l].title;
            document.getElementById('sec-intl').innerText = db[l].secIntl;
            document.getElementById('sec-ua').innerText = db[l].secUa;
            document.getElementById('sec-docs').innerText = db[l].secDocs;
            document.getElementById('meth-title').innerText = db[l].methTitle;
            document.getElementById('meth-desc').innerText = db[l].methDesc;
            document.getElementById('meth-footer').innerText = db[l].methFooter;
            document.getElementById('footer-text').innerHTML = db[l].footer;
            document.getElementById('sourceSearch').placeholder = db[l].searchPlaceholder;
            document.getElementById('btn-random').innerText = db[l].btnRandom;

            const uniList = document.getElementById('meth-list');
            uniList.innerHTML = '';
            db[l].methUni.forEach(u => { uniList.innerHTML += `<li><strong>${u}</strong></li>`; });

            renderLinks('list-intl', db[l].intlLinks);
            renderLinks('list-ua', db[l].uaLinks);
            renderLinks('list-docs', db[l].docLinks);
        }

        function renderLinks(targetId, links) {
            const container = document.getElementById(targetId);
            container.innerHTML = '';
            links.forEach(link => {
                container.innerHTML += `<li><a href="${link.u}" target="_blank">${link.n}</a></li>`;
            });
        }

        function searchSources() {
            let input = document.getElementById('sourceSearch').value.toLowerCase();
            let items = document.querySelectorAll('.source-list li');
            items.forEach(item => {
                let text = item.innerText.toLowerCase();
                item.style.display = text.includes(input) ? "" : "none";
            });
        }

        function highlightRandom() {
            let items = document.querySelectorAll('.source-list li');
            items.forEach(i => i.classList.remove('highlight-random'));
            let randomItem = items[Math.floor(Math.random() * items.length)];
            randomItem.classList.add('highlight-random');
            randomItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        window.onload = () => { updateLang('ua', document.querySelector('.lang-trigger.active')); };
    </script>
</body>
</html>
