<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Interaktive Extras - The Russo-Ukrainian War</title>
    <style>
        :root { --ua-blue: #0057b7; --ua-gold: #ffd700; --accent-red: #ce1212; --dark-bg: #121212; --card-bg: #1e1e1e; --text-main: #e0e0e0; }
        body { background: var(--dark-bg); color: var(--text-main); font-family: 'Segoe UI', sans-serif; margin: 0; line-height: 1.6; }

        /* Navbar Styles */
        .top { padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; background: rgba(18,18,18,0.95); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #333; }
        .logo { font-weight: 900; text-decoration: none; color: #fff; font-size: 1.3em; }
        .navbar__menu { display: flex; list-style: none; padding: 0; margin: 0; gap: 20px; }
        .navbar__menu a { color: #fff; text-decoration: none; font-weight: 600; font-size: 0.9em; transition: 0.3s; }
        .navbar__menu a:hover { color: var(--ua-gold); }

        .wrapper { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }

        /* Lang Switcher */
        .control-panel { display: flex; justify-content: center; gap: 10px; margin-bottom: 40px; }
        .lang-trigger { border: 1px solid #444; padding: 8px 15px; border-radius: 30px; cursor: pointer; background: transparent; color: white; transition: 0.3s; font-weight: bold; }
        .lang-trigger.active { background: var(--ua-gold); color: #000; border-color: var(--ua-gold); }

        /* Myth Cards */
        .myth-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .myth-card { height: 220px; perspective: 1000px; cursor: pointer; }
        .myth-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .myth-card.flipped .myth-inner { transform: rotateY(180deg); }
        .myth-front, .myth-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 25px; border-radius: 20px; border: 1px solid #333; text-align: center; box-sizing: border-box; }
        .myth-front { background: var(--card-bg); border-top: 4px solid var(--accent-red); }
        .myth-back { background: linear-gradient(135deg, #004494, #002d62); color: white; transform: rotateY(180deg); }

        /* Quiz Box */
        .quiz-card { background: var(--card-bg); padding: 40px; border-radius: 25px; border: 1px solid #333; margin-top: 60px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        .option-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 12px; cursor: pointer; transition: 0.3s; font-size: 1em; }
        .option-btn:hover { background: #3a3a3a; border-color: var(--ua-gold); }
        .option-btn.correct { background: #2e7d32 !important; }
        .option-btn.wrong { background: #c62828 !important; }
        .btn-next { background: var(--ua-gold); color: black; border: none; padding: 12px 30px; border-radius: 25px; font-weight: 900; cursor: pointer; margin-top: 20px; display: none; }
    </style>
</head>
<body>
    <header class="top">
        <a class="logo" href="index.html">History Project</a>
        <nav class="navbar">
            <ul class="navbar__menu">
                <li><a href="index.html">Homepage</a></li>
                <li><a href="navigaciya-po-proiektu-dlya-en-de-project-navigation-en-projekt-navigation-de.html">Navigation</a></li>
            </ul>
        </nav>
    </header>

    <div class="wrapper">
        <div class="control-panel">
            <button class="lang-trigger active" onclick="setLang('ua', this)">🇺🇦 UA</button>
            <button class="lang-trigger" onclick="setLang('en', this)">🇬🇧 EN</button>
            <button class="lang-trigger" onclick="setLang('de', this)">🇩🇪 DE</button>
        </div>

        <h1 id="title" style="text-align: center; font-size: 2.5em; color: white; margin-bottom: 50px;">Інтерактивні додатки</h1>

        <h2 id="myth-title" style="color: var(--ua-gold);">🛡️ Детектор міфів про війну</h2>
        <div class="myth-grid" id="myth-container"></div>

        <div class="quiz-card">
            <h2 id="quiz-title" style="color: var(--ua-gold); margin-top:0;">📝 Квіз: Російсько-українська війна</h2>
            <div id="quiz-body">
                <h3 id="question-text" style="font-size: 1.3em;"></h3>
                <div id="options-container"></div>
                <button id="next-btn" class="btn-next" onclick="nextQuestion()">Далі →</button>
            </div>
            <div id="quiz-result" style="display:none;">
                <h2 id="result-msg"></h2>
                <button class="btn-next" style="display:inline-block;" onclick="restartQuiz()">Спочатку</button>
            </div>
        </div>
    </div>

    <script>
        const content = {
            ua: {
                title: "Інтерактивні додатки", mythT: "Детектор міфів про війну", quizT: "Квіз: Російсько-українська війна",
                myths: [
                    {f: "Міф: Війна розпочалася у 2022 році", b: "Факт: Російська агресія розпочалася у лютому 2014 року з окупації Криму та частини Донбасу."},
                    {f: "Міф: «Спецоперація» мала тривати 3 дні", b: "Факт: Російський план швидкого захоплення Києва повністю провалився завдяки спротиву ЗСУ та суспільства."},
                    {f: "Міф: Санкції не впливають на Росію", b: "Факт: Світові санкції суттєво обмежують технологічний розвиток РФ та її доходи від експорту енергоносіїв."}
                ],
                quiz: [
                    {q: "У якому році Росія анексувала Крим та розпочала війну на Донбасі?", a: ["2014 рік", "2018 рік", "2022 рік"], c: 0},
                    {q: "Яку назву отримав цивільний та військовий опір мешканців під час оборони Маріуполя на заводі?", a: ["Азовсталь", "Арсенал", "Запоріжсталь"], c: 0},
                    {q: "Коли відбулося повномасштабне вторгнення Росії в Україну?", a: ["24 лютого 2022", "12 квітня 2014", "9 травня 2023"], c: 0}
                ],
                next: "Далі →", restart: "Спочатку", score: "Твій результат: "
            },
            en: {
                title: "Interactive Extras", mythT: "War Myth Detector", quizT: "Quiz: Russo-Ukrainian War",
                myths: [
                    {f: "Myth: The war started in 2022", b: "Fact: Russian aggression began in February 2014 with the occupation of Crimea and parts of Donbas."},
                    {f: "Myth: The 'special operation' was meant to last 3 days", b: "Fact: The Russian blitzkrieg plan to capture Kyiv completely failed due to the fierce resistance of Ukraine."},
                    {f: "Myth: Sanctions do not affect Russia", b: "Fact: Global sanctions significantly restrict Russia's technological growth and energy revenues."}
                ],
                quiz: [
                    {q: "In which year did Russia annex Crimea and start the war in Donbas?", a: ["2014", "2018", "2022"], c: 0},
                    {q: "What was the name of the steel plant where Ukrainian defenders held the line in Mariupol?", a: ["Azovstal", "Arsenal", "Zaporizhstal"], c: 0},
                    {q: "When did Russia launch its full-scale invasion of Ukraine?", a: ["February 24, 2022", "April 12, 2014", "May 9, 2023"], c: 0}
                ],
                next: "Next →", restart: "Restart", score: "Your score: "
            },
            de: {
                title: "Interaktive Extras", mythT: "Kriegsmythos-Detektor", quizT: "Quiz: Der Russisch-Ukrainische Krieg",
                myths: [
                    {f: "Mythos: Der Krieg begann erst 2022", b: "Fakt: Die russische Aggression begann im Februar 2014 mit der Besetzung der Krim und Teilen des Donbas."},
                    {f: "Mythos: Die 'Spezialoperation' sollte 3 Tage dauern", b: "Fakt: Der russische Blitzkrieg-Plan zur Einnahme von Kiew scheiterte am Widerstand der Ukraine völlig."},
                    {f: "Mythos: Sanktionen haben keine Wirkung auf Russland", b: "Fakt: Globale Sanktionen schränken die technologische Entwicklung und die Energieeinnahmen Russlands stark ein."}
                ],
                quiz: [
                    {q: "In welchem Jahr hat Russland die Krim annektiert und den Krieg im Donbas begonnen?", a: ["2014", "2018", "2022"], c: 0},
                    {q: "Wie hieß das Stahlwerk, in dem ukrainische Verteidiger in Mariupol Widerstand leisteten?", a: ["Azovstal", "Arsenal", "Zaporizhstal"], c: 0},
                    {q: "Wann begann die umfassende Invasion Russlands in der Ukraine?", a: ["24. Februar 2022", "12. April 2014", "9. Mai 2023"], c: 0}
                ],
                next: "Weiter →", restart: "Neustart", score: "Dein Ergebnis: "
            }
        };

        let currentLang = 'ua'; let currentQ = 0; let score = 0;

        function setLang(l, btn) {
            currentLang = l;
            document.querySelectorAll('.lang-trigger').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updateUI();
        }

        function updateUI() {
            const l = content[currentLang];
            document.getElementById('title').innerText = l.title;
            document.getElementById('myth-title').innerText = l.mythT;
            document.getElementById('quiz-title').innerText = l.quizT;

            const mc = document.getElementById('myth-container');
            mc.innerHTML = '';
            l.myths.forEach(m => {
                mc.innerHTML += `<div class="myth-card" onclick="this.classList.toggle('flipped')">
                    <div class="myth-inner">
                        <div class="myth-front"><h3>${m.f}</h3></div>
                        <div class="myth-back"><p>${m.b}</p></div>
                    </div>
                </div>`;
            });
            restartQuiz();
        }

        function loadQuestion() {
            const q = content[currentLang].quiz[currentQ];
            document.getElementById('question-text').innerText = q.q;
            const oc = document.getElementById('options-container');
            oc.innerHTML = '';
            q.a.forEach((opt, i) => { oc.innerHTML += `<button class="option-btn" onclick="handleAns(${i}, this)">${opt}</button>`; });
            document.getElementById('next-btn').style.display = 'none';
        }

        function handleAns(i, btn) {
            const q = content[currentLang].quiz[currentQ];
            if(i === q.c) { btn.classList.add('correct'); score++; } else { btn.classList.add('wrong'); }
            document.querySelectorAll('.option-btn').forEach(b => b.onclick = null);
            document.getElementById('next-btn').style.display = 'inline-block';
            document.getElementById('next-btn').innerText = content[currentLang].next;
        }

        function nextQuestion() {
            currentQ++;
            if(currentQ < content[currentLang].quiz.length) { loadQuestion(); } else { showResult(); }
        }

        function showResult() {
            document.getElementById('quiz-body').style.display = 'none';
            const res = document.getElementById('quiz-result');
            res.style.display = 'block';
            document.getElementById('result-msg').innerText = content[currentLang].score + score + "/" + content[currentLang].quiz.length;
        }

        function restartQuiz() {
            currentQ = 0; score = 0;
            document.getElementById('quiz-body').style.display = 'block';
            document.getElementById('quiz-result').style.display = 'none';
            loadQuestion();
        }

        window.onload = updateUI;
    </script>
</body>
</html>
