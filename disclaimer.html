<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Disclaimer - School History Project</title>
    <link rel="stylesheet" href="https://altsumkanews.github.io/historyproje/assets/css/style.css">
    
    <style>
        :root {
            --ua-gold: #ffd700;
            --accent-red: #ce1212;
            --dark-card: #1a1a1a;
            --deep-blue: #0b2447;
        }

        body { background-color: #000; color: #fff; font-family: sans-serif; }
        .custom-wrapper { max-width: 900px; margin: 0 auto; padding: 40px 20px; }

        .control-panel { display: flex; justify-content: center; gap: 10px; margin-bottom: 40px; background: #1a1a1a; padding: 10px; border-radius: 50px; border: 1px solid #333; }
        .lang-trigger { border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; font-weight: 700; background: transparent; color: #888; transition: 0.3s; }
        .lang-trigger.active { background: var(--ua-gold); color: #000; }

        .disclaimer-card { 
            background: var(--dark-card); 
            border-radius: 20px; 
            padding: 40px; 
            border: 1px solid rgba(255,255,255,0.1);
            line-height: 1.6;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        h1 { color: var(--ua-gold); font-size: 2.2em; margin-bottom: 30px; border-bottom: 2px solid var(--accent-red); display: inline-block; padding-bottom: 5px; }
        h2 { color: var(--ua-gold); font-size: 1.4em; margin-top: 30px; margin-bottom: 15px; }
        p { margin-bottom: 15px; color: #d1d1d1; }
        ul { margin-bottom: 20px; padding-left: 20px; color: #d1d1d1; }
        li { margin-bottom: 10px; }

        .back-home-container { text-align: center; margin-top: 50px; }
        .cta-button { 
            display: inline-block; 
            padding: 20px 50px; 
            background: var(--accent-red); 
            color: white !important; 
            border-radius: 50px; 
            text-decoration: none; 
            font-weight: 800; 
            transition: 0.3s; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .cta-button:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(206, 18, 18, 0.4); }
        
        .animate-flux { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

<body>
    <main class="custom-wrapper">
        <!-- Перемикач мов -->
        <div class="control-panel">
            <button class="lang-trigger active" onclick="updateLang('ua', this)">🇺🇦 UA</button>
            <button class="lang-trigger" onclick="updateLang('en', this)">🇬🇧 EN</button>
            <button class="lang-trigger" onclick="updateLang('de', this)">🇩🇪 DE</button>
        </div>

        <div id="content-box" class="disclaimer-card animate-flux">
            <!-- Контент генерується скриптом -->
        </div>

        <div class="back-home-container">
            <a href="index.html" class="cta-button" id="back-btn">На головну ➔</a>
        </div>
    </main>

    <script>
        const db = {
            ua: {
                title: "Правове застереження",
                backBtn: "Повернутися на головну ➔",
                sections: [
                    { h: "Загальна інформація", p: "Цей вебсайт є частиною шкільного проєкту з історії, створеного в навчальних цілях. Весь контент відображає особисту дослідницьку позицію автора, сформовану на основі аналізу історичних джерел, особистого досвіду та проведених соцопитувань." },
                    { h: "Джерела та авторське право", p: "У проєкті використано історичні цитати та фотографії документів з відкритих джерел. Авторські права на ці матеріали належать їхнім законним власникам. Переклади іншомовних джерел виконані автором проєкту самостійно; хоча автор прагнув до точності, переклади не є офіційними." },
                    { h: "Особиста позиція", p: "Погляди, викладені на сайті, є інтерпретацією автора і не обов'язково збігаються з офіційною позицією навчального закладу чи академічних установ." },
                    { h: "Конфіденційність (Соцопитування)", p: "Всі дані соцопитувань, представлені в проєкті, збиралися на умовах повної анонімності. Вони використовуються виключно для статистичного аналізу в межах цієї шкільної роботи." }
                ]
            },
            en: {
                title: "Legal Disclaimer",
                backBtn: "Back to Home ➔",
                sections: [
                    { h: "General Information", p: "This website is part of a school history project created for educational purposes. All content reflects the author's personal research position, formed through the analysis of historical sources, personal experience, and social surveys." },
                    { h: "Sources & Copyright", p: "Historical quotes and document photographs from open sources are used in this project. All copyrights belong to their respective owners. Translations of foreign sources were made by the author; while accuracy was a priority, these are not official translations." },
                    { h: "Personal Perspective", p: "The views expressed on this site are the author's interpretation and do not necessarily reflect the official position of the educational institution or academic bodies." },
                    { h: "Data Privacy (Surveys)", p: "All survey data presented in the project was collected anonymously. It is used exclusively for statistical analysis within this school assignment." }
                ]
            },
            de: {
                title: "Rechtliche Hinweise",
                backBtn: "Zurück zur Startseite ➔",
                sections: [
                    { h: "Allgemeine Informationen", p: "Diese Website ist Teil eines schulischen Geschichtsprojekts, das zu Bildungszwecken erstellt wurde. Alle Inhalte spiegeln die persönliche Forschungsposition des Autors wider, die auf der Analyse historischer Quellen, persönlichen Erfahrungen und sozialen Umfragen basiert." },
                    { h: "Quellen & Urheberrecht", p: "In diesem Projekt werden historische Zitate und Fotografien von Dokumenten aus offenen Quellen verwendet. Alle Urheberrechte liegen bei den jeweiligen Eigentümern. Übersetzungen ausländischer Quellen wurden vom Autor selbst angefertigt; obwohl um Genauigkeit gebeten wurde, handelt es sich nicht um offizielle Übersetzungen." },
                    { h: "Persönliche Position", p: "Die auf dieser Website geäußerten Ansichten sind die Interpretation des Autors und entsprechen nicht unbedingt der offiziellen Position der Bildungseinrichtung oder akademischer Gremien." },
                    { h: "Datenschutz (Umfragen)", p: "Alle im Projekt präsentierten Umfragedaten wurden anonym erhoben. Sie werden ausschließlich für statistische Analysen im Rahmen dieser Schularbeit verwendet." }
                ]
            }
        };

        function updateLang(l, b) {
            const data = db[l];
            document.querySelectorAll('.lang-trigger').forEach(x => x.classList.remove('active'));
            b.classList.add('active');

            const contentBox = document.getElementById('content-box');
            contentBox.classList.remove('animate-flux');
            void contentBox.offsetWidth; // Trigger reflow
            contentBox.classList.add('animate-flux');

            let html = `<h1>${data.title}</h1>`;
            data.sections.forEach(s => {
                html += `<h2>${s.h}</h2><p>${s.p}</p>`;
            });

            contentBox.innerHTML = html;
            document.getElementById('back-btn').innerText = data.backBtn;
        }

        window.onload = () => { updateLang('ua', document.querySelector('.lang-trigger.active')); };
    </script>
</body>
</html>
