<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Impact of Ukraine on Germany - History Project</title>
    <style>
        :root { --ua-gold: #ffd700; --accent-red: #ce1212; --bg: #121212; }
        body { background: var(--bg); color: #e0e0e0; font-family: sans-serif; margin: 0; }
        .top { padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; border-bottom: 1px solid #333; }
        .logo { font-weight: 900; color: #fff; text-decoration: none; text-transform: uppercase; letter-spacing: 1px; }
        
        .custom-wrapper { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .card-de { 
            background: #1e1e1e; 
            border-radius: 15px; 
            padding: 30px; 
            margin-bottom: 25px; 
            border-left: 4px solid var(--ua-gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: 0.3s;
        }
        .card-de:hover { transform: translateY(-5px); border-left-color: var(--accent-red); }
        
        h2 { color: var(--ua-gold); margin-top: 0; font-size: 1.4em; }
        
        /* Стиль кнопок як на головній */
        .lang-ctrl { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .btn-l { 
            background: transparent; border: 1px solid #444; color: #888; 
            padding: 10px 25px; border-radius: 30px; cursor: pointer; 
            font-weight: bold; transition: 0.3s;
        }
        .btn-l.active { border-color: var(--ua-gold); color: #000; background: var(--ua-gold); }
        
        .navbar__menu { display: flex; list-style: none; gap: 20px; margin: 0; padding: 0; }
        .navbar__menu a { color: #aaa; text-decoration: none; font-weight: 600; font-size: 0.9em; }
        .navbar__menu a:hover { color: var(--ua-gold); }

        .timeline-header { text-align: center; margin-bottom: 50px; }
        .timeline-header h1 { font-size: 2.2em; margin-bottom: 15px; color: #fff; }
        .intro-text { color: #bbb; max-width: 750px; margin: 0 auto; line-height: 1.6; }
    </style>
</head>
<body>
    <header class="top">
        <a class="logo" href="index.html">History Project</a>
        <nav>
            <ul class="navbar__menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="sources.html">Sources</a></li>
                <li><a href="disclaimer.html" id="nav-disc">Disclaimer</a></li>
            </ul>
        </nav>
    </header>

    <main class="custom-wrapper">
        <div class="timeline-header">
            <div class="lang-ctrl">
                <button class="btn-l active" onclick="changeL('ua', this)">UA</button>
                <button class="btn-l" onclick="changeL('en', this)">EN</button>
                <button class="btn-l" onclick="changeL('de', this)">DE</button>
            </div>
            <h1 id="m-title"></h1>
            <p class="intro-text" id="m-intro"></p>
        </div>

        <div id="cards"></div>
    </main>

    <script>
        const info = {
            ua: {
                title: "Вплив конфліктів в Україні на сучасну Німеччину",
                intro: "Аналіз того, як історичні та сучасні події в Україні змінили політику, безпеку та суспільство Німеччини.",
                navDisc: "Застереження",
                points: [
                    { t: "Історичне підґрунтя", d: "На початку XX століття Берлін став одним із найбільших центрів української політичної еміграції. Це заклало фундамент для розуміння України як окремого гравця, а не частини імперії." },
                    { t: "Зміна зовнішньої політики (Zeitenwende)", d: "Конфлікт 2022 року змусив Німеччину відмовитися від десятиліть політики 'змін через торгівлю'. Це призвело до найбільшого переозброєння Бундесверу та енергетичної незалежності." },
                    { t: "Суспільна трансформація", d: "Прийом понад мільйона біженців став викликом та можливістю для Німеччини. Це змінило німецькі школи, ринок праці та культурний ландшафт міст." },
                    { t: "Нова роль у Європі", d: "Сьогодні Німеччина переосмислює свою відповідальність, стаючи лідером у підтримці України, що безпосередньо впливає на стабільність та майбутні кордони ЄС." }
                ]
            },
            en: {
                title: "Impact of Ukrainian Conflicts on Modern Germany",
                intro: "An analysis of how historical and current events in Ukraine have reshaped German politics, security, and society.",
                navDisc: "Disclaimer",
                points: [
                    { t: "Historical Foundations", d: "In the early 20th century, Berlin became one of the major centers for Ukrainian political emigration, laying the groundwork for recognizing Ukraine as a sovereign entity." },
                    { t: "The Shift in Foreign Policy (Zeitenwende)", d: "The 2022 conflict forced Germany to abandon decades of 'change through trade' policy, leading to the massive rearmament of the Bundeswehr and energy independence." },
                    { t: "Social Transformation", d: "Welcoming over a million refugees has reshaped German schools, the labor market, and the cultural landscape of its cities." },
                    { t: "A New Role in Europe", d: "Germany is redefining its responsibility, becoming a leader in supporting Ukraine, which directly impacts the stability and future borders of the EU." }
                ]
            },
            de: {
                title: "Einfluss ukrainischer Konflikte auf das heutige Deutschland",
                intro: "Eine Analyse, wie historische und aktuelle Ereignisse in der Ukraine die deutsche Politik, Sicherheit und Gesellschaft verändert haben.",
                navDisc: "Rechtliches",
                points: [
                    { t: "Historische Grundlagen", d: "Anfang des 20. Jahrhunderts wurde Berlin zu einem der größten Zentren der ukrainischen politischen Emigration und legte den Grundstein für die Wahrnehmung der Ukraine als eigenständigen Akteur." },
                    { t: "Zeitenwende in der Außenpolitik", d: "Der Konflikt von 2022 zwang Deutschland, die jahrzehntelange Politik des 'Wandels durch Handel' aufzugeben, was zu einer massiven Aufrüstung der Bundeswehr führte." },
                    { t: "Gesellschaftlicher Wandel", d: "Die Aufnahme von über einer Million Flüchtlingen hat die deutschen Schulen, den Arbeitsmarkt und das kulturelle Bild der Städte nachhaltig verändert." },
                    { t: "Neue Rolle in Europa", d: "Deutschland definiert seine Verantwortung neu und wird zum Vorreiter bei der Unterstützung der Ukraine, was die Stabilität der EU direkt beeinflusst." }
                ]
            }
        };

        function changeL(lang, btn) {
            document.querySelectorAll('.btn-l').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');

            const content = info[lang];
            document.getElementById('m-title').innerText = content.title;
            document.getElementById('m-intro').innerText = content.intro;
            document.getElementById('nav-disc').innerText = content.navDisc;
            
            const container = document.getElementById('cards');
            container.innerHTML = content.points.map(p => `
                <div class="card-de">
                    <h2>${p.t}</h2>
                    <p>${p.d}</p>
                </div>
            `).join('');
        }

        window.onload = () => { changeL('ua', document.querySelector('.btn-l')); };
    </script>
</body>
</html>
