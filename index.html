<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>School History Project - The Historical Loop</title>
    
    <style>
        :root {
            --ua-blue: #0057b7;
            --ua-gold: #ffd700;
            --accent-red: #ce1212;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
        }

        body {
            background: linear-gradient(to bottom, #121212, #1a1a1a);
            color: var(--text-main);
            scroll-behavior: smooth;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .progress-bar {
            position: fixed; top: 0; left: 0; height: 4px;
            background: var(--accent-red); z-index: 1001; width: 0%;
        }

        .custom-wrapper { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }

        /* Попередження про звук */
        #audio-warning {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }

        /* Словник документів */
        .doc-quote {
            font-style: italic; color: var(--ua-gold); border-left: 3px solid var(--accent-red);
            padding-left: 15px; margin: 15px 0; font-size: 0.95em;
        }

        .glossary-section {
            background: linear-gradient(145deg, #252525, #1a1a1a);
            border: 1px solid #333; border-radius: 24px; padding: 40px;
            text-align: center; cursor: pointer; transition: 0.4s;
            box-shadow: 0 15px 45px rgba(0,0,0,0.4); margin: 20px 0;
        }

        .glossary-section:hover { transform: scale(1.01); border-color: var(--ua-gold); }
        .glossary-title { font-size: 2.2em; margin: 10px 0; color: #fff; }

        /* Кнопки звуку */
        .audio-btn {
            background: none; border: 1px solid #444; color: #fff;
            border-radius: 50%; width: 40px; height: 40px;
            margin-left: 15px; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .audio-btn:hover { background: var(--accent-red); border-color: var(--accent-red); }

        summary {
            list-style: none; padding: 25px; background: #222; border-radius: 12px;
            font-size: 1.2em; font-weight: 700; cursor: pointer; display: flex; align-items: center;
            border: 1px solid #333;
        }
        
        .loop-content { padding: 25px; background: #1a1a1a; border-radius: 0 0 12px 12px; border: 1px solid #333; }

        .lang-trigger { background: #222; color: #888; border: 1px solid #333; padding: 10px 20px; border-radius: 50px; cursor: pointer; margin: 0 5px; }
        .lang-trigger.active { background: var(--accent-red); color: white; }

        .btn-confirm {
            padding: 15px 40px; background: var(--ua-blue); color: white;
            border: none; border-radius: 30px; cursor: pointer; font-weight: bold; margin-top: 20px;
        }
    </style>
</head>

<body>
    <div id="audio-warning">
        <h2>⚠️ Попередження / Warning</h2>
        <p>Цей проєкт містить аудіо-ефекти (сурми, сирени).<br>This project contains sound effects.</p>
        <button class="btn-confirm" onclick="closeWarning()">Зрозуміло / I understand</button>
    </div>

    <div class="progress-bar" id="scrollBar"></div>

    <main class="custom-wrapper">
        <section style="text-align: center; margin-top: 40px;">
            <h1 style="font-size: 3.5em; font-weight: 900; color: #fff;">The Historical Loop</h1>
            <div class="control-panel" style="margin: 30px 0;">
                <button class="lang-trigger active" onclick="updateAppLang('ua', this)">🇺🇦 UA</button>
                <button class="lang-trigger" onclick="updateAppLang('en', this)">🇬🇧 EN</button>
                <button class="lang-trigger" onclick="updateAppLang('de', this)">🇩🇪 DE</button>
            </div>
        </section>

        <div class="glossary-section" onclick="rotateTerm()">
            <span id="g-label" class="glossary-tag" style="color:var(--ua-gold)">Словник термінів</span>
            <div id="g-box">
                <h3 id="g-title" class="glossary-title">...</h3>
                <p id="g-desc" class="glossary-desc">...</p>
            </div>
        </div>

        <div class="glossary-section" onclick="rotateDoc()" style="border-left: 5px solid var(--ua-blue);">
            <span id="d-label" class="glossary-tag" style="color:var(--ua-blue)">Архів документів</span>
            <div id="d-box">
                <h3 id="d-title" class="glossary-title" style="font-size: 1.8em;">...</h3>
                <div id="d-quote" class="doc-quote">...</div>
                <p id="d-desc" class="glossary-desc" style="font-size: 0.9em;">...</p>
            </div>
        </div>

        <div id="l-container" class="loop-container" style="margin-top: 50px;"></div>
    </main>

    <audio id="sound-1654" src="https://www.soundjay.com/buttons/beep-01a.mp3"></audio> <audio id="sound-2022" src="https://www.soundjay.com/nature/sounds/rain-01.mp3"></audio> <script>
        const db = {
            ua: {
                label: "Термінологія свободи",
                docLabel: "Свідчення агресії (Документи)",
                glossary: [
                    {t: "Укр. Центральна Рада", d: "Перший парламент України у 1917 році. Намагалися мирно відродити державу, поки Росія не почала наступ."},
                    {t: "УНР (Українська Народна Республіка)", d: "Наша держава, яка в 1918 році проголосила повну незалежність від Росії."},
                    {t: "Директорія", d: "Керівний орган УНР, який очолював Симон Петлюра у боротьбі проти більшовицької окупації."},
                    {t: "Розстріляне відродження", d: "Знищення цілого покоління українських митців радянським режимом у 1930-х роках."}
                ],
                docs: [
                    {t: "Валуєвський циркуляр (1863)", q: "«никакого особенного малороссийского языка не было, нет и быть не может»", d: "Спроба імперії стерти ідентичність, заборонивши освіту та релігійні книги українською."},
                    {t: "Емський указ (1876)", q: "«Не допускати ввезення... будь-яких книг, виданих за кордоном малоросійською говіркою»", d: "Тотальна цензура: заборона навіть театральних вистав та нот з українськими текстами."},
                    {t: "Конституція СРСР (1936)", q: "«Союз РСР забезпечує єдність...»", d: "Юридична ширма для повної централізації влади в Москві та знищення автономії республік."}
                ],
                timeline: [
                    {date: "1654", title: "Березневі статті", desc: "Початок 'братніх обіймів'. Військовий союз, який Росія перетворила на окупацію.", sound: "1654"},
                    {date: "1917", title: "Відродження", desc: "Створення УНР. Росія (біла і червона) миттєво атакує, щоб повернути контроль."},
                    {date: "2022", title: "Повномасштабне вторгнення", desc: "Остаточна маска скинута. Росія відкрито намагається завершити геноцид.", sound: "2022"}
                ]
            },
            en: {
                label: "Glossary of Freedom",
                docLabel: "Evidence of Aggression (Documents)",
                glossary: [
                    {t: "Central Rada", d: "The first Ukrainian parliament in 1917. They tried to revive the state peacefully before Russia attacked."},
                    {t: "UNR", d: "The Ukrainian People's Republic, which declared full independence from Russia in 1918."},
                    {t: "Executed Renaissance", d: "A generation of Ukrainian creators murdered by the Soviet regime in the 1930s."}
                ],
                docs: [
                    {t: "Valuev Circular (1863)", q: "«A separate Little Russian language never existed, does not exist, and cannot exist»", d: "The Empire's attempt to erase identity by banning Ukrainian education."},
                    {t: "Ems Ukaz (1876)", q: "«Ban the import of any books... published abroad in the Little Russian dialect»", d: "Total censorship: banning Ukrainian theater and music lyrics."}
                ],
                timeline: [
                    {date: "1654", title: "March Articles", desc: "The beginning of the 'brotherly embrace'. A military alliance Russia turned into occupation.", sound: "1654"},
                    {date: "2022", title: "Full-scale Invasion", desc: "The final mask falls. Russia openly attempts to complete the genocide.", sound: "2022"}
                ]
            },
            de: {
                label: "Lexikon der Freiheit",
                docLabel: "Beweise der Aggression (Dokumente)",
                glossary: [
                    {t: "Zentralna Rada", d: "Das erste ukrainische Parlament im Jahr 1917. Versuch einer friedlichen Staatsbildung."},
                    {t: "UNR", d: "Ukrainische Volksrepublik, die 1918 ihre Unabhängigkeit von Russland erklärte."}
                ],
                docs: [
                    {t: "Waluew-Zirkular (1863)", q: "«Eine separate kleinrussische Sprache hat es nie gegeben, gibt es nicht und kann es nicht geben»", d: "Der Versuch des Reiches, die Identität durch das Verbot ukrainischer Bildung zu löschen."},
                    {t: "Ems-Erlass (1876)", q: "«Einfuhr von Büchern... in kleinrussischer Mundart untersagt»", d: "Totale Zensur: Verbot von ukrainischem Theater und Musiktexten."}
                ],
                timeline: [
                    {date: "1654", title: "März-Artikel", desc: "Beginn der 'brüderlichen Umarmung', die in Besatzung endete.", sound: "1654"},
                    {date: "2022", title: "Invasion", desc: "Russland versucht offen, den Genozid an der Ukraine zu vollenden.", sound: "2022"}
                ]
            }
        };

        let currentLang = 'ua';
        let termIdx = 0;
        let docIdx = 0;

        function closeWarning() {
            document.getElementById('audio-warning').style.display = 'none';
        }

        function playSound(id) {
            const audio = document.getElementById(`sound-${id}`);
            if (audio) {
                audio.currentTime = 0;
                audio.play().catch(e => console.log("Sound blocked by browser"));
            }
        }

        function updateAppLang(lang, btn) {
            currentLang = lang;
            document.querySelectorAll('.lang-trigger').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('g-label').innerText = db[lang].label;
            document.getElementById('d-label').innerText = db[lang].docLabel;
            rotateTerm();
            rotateDoc();
            renderTimeline();
        }

        function rotateTerm() {
            const item = db[currentLang].glossary[termIdx];
            document.getElementById('g-title').innerText = item.t;
            document.getElementById('g-desc').innerText = item.d;
            termIdx = (termIdx + 1) % db[currentLang].glossary.length;
        }

        function rotateDoc() {
            const item = db[currentLang].docs[docIdx];
            document.getElementById('d-title').innerText = item.t;
            document.getElementById('d-quote').innerText = item.q;
            document.getElementById('d-desc').innerText = item.d;
            docIdx = (docIdx + 1) % db[currentLang].docs.length;
        }

        function renderTimeline() {
            const container = document.getElementById('l-container');
            container.innerHTML = '';
            db[currentLang].timeline.forEach((item) => {
                const details = document.createElement('details');
                details.className = 'loop-item visible';
                const soundBtn = item.sound ? `<button class="audio-btn" onclick="playSound('${item.sound}')">🔊</button>` : '';
                details.innerHTML = `
                    <summary>${item.date} — ${item.title} ${soundBtn}</summary>
                    <div class="loop-content">${item.desc}</div>
                `;
                container.appendChild(details);
            });
        }

        window.onload = () => { renderTimeline(); rotateTerm(); rotateDoc(); };
    </script>
</body>
</html>
