<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>History Project - The Historical Loop</title>

<style>
:root {
    --accent-red:#ce1212;
    --ua-gold:#ffd700;
    --dark:#121212;
}

body{
    background:linear-gradient(#121212,#1a1a1a);
    color:#e0e0e0;
    font-family:Arial;
}

.glossary-section{
    background:#1e1e1e;
    padding:40px;
    border-radius:20px;
    margin:30px 0;
    cursor:pointer;
    transition:.3s;
}
.glossary-section:hover{transform:scale(1.02);}

.glossary-title{font-size:2.5em;}
.glossary-desc{color:#aaa; min-height:80px;}
.doc-desc{white-space:pre-line; text-align:left; min-height:160px;}

.lang-trigger{
    padding:10px 20px;
    border:none;
    margin:5px;
    cursor:pointer;
}
.active{background:var(--accent-red); color:#fff;}
</style>
</head>

<body>

<div style="text-align:center; margin-top:40px;">
<h1>The Historical Loop</h1>
</div>

<div style="text-align:center;">
<button class="lang-trigger active" onclick="setLang('ua',this)">UA</button>
<button class="lang-trigger" onclick="setLang('en',this)">EN</button>
<button class="lang-trigger" onclick="setLang('de',this)">DE</button>
</div>

<!-- ТЕРМІНИ -->
<div class="glossary-section" onclick="nextTerm()">
<h2 id="g-title">...</h2>
<p id="g-desc" class="glossary-desc"></p>
</div>

<!-- ДОКУМЕНТИ -->
<div class="glossary-section" onclick="nextDoc()">
<h2 id="d-title">...</h2>
<p id="d-desc" class="doc-desc"></p>
</div>

<script>
const db={
ua:{
terms:[
["Гетьманщина","Козацька держава з власним устроєм."],
["УНР","Українська Народна Республіка — спроба незалежності 1917."],
["Центральна Рада","Політичний орган, що очолив відродження державності."],
["Акт Злуки","Об’єднання українських земель."],
["Українізація","Відродження культури, згодом знищене СРСР."],
["Колективізація","Примусове об’єднання селян, що зруйнувало село."],
["Валуєвський циркуляр","Заборона української мови."],
["Емський указ","Повна заборона культури."]
],
docs:[
["Валуєвський циркуляр",
`(орг) «малороссийского языка не было, нет и быть не может»
(укр) «малоросійської мови не було, немає і бути не може»
(en) "there was no Little Russian language and there cannot be"`],

["Емський указ",
`(орг) «не допускать ввоза книг на малорусском наречии»
(укр) «заборонити ввезення книг українською»
(en) "ban import of Ukrainian books"`],

["Політика СРСР",
`(орг) «русский язык — язык межнационального общения»
(укр) «російська — мова міжнаціонального спілкування»
(en) "Russian is the language of interethnic communication"`],

["Згортання українізації",
`(орг) «прекратить украинизацию»
(укр) «припинити українізацію»
(en) "stop Ukrainization"`],

["Боротьба з націоналізмом",
`(орг) «бороться с украинским буржуазным национализмом»
(укр) «боротися з українським націоналізмом»
(en) "fight Ukrainian nationalism"`]
]
},

en:{
terms:[
["Hetmanate","Cossack state with autonomy."],
["UNR","Ukrainian People's Republic (1917)."],
["Central Rada","Revolutionary parliament."],
["Act of Union","Unification of Ukrainian lands."],
["Ukrainization","Cultural revival later suppressed."],
["Collectivization","Forced rural restructuring."],
["Valuev Circular","Ban on Ukrainian language."],
["Ems Ukaz","Total cultural ban."]
],
docs:[
["Valuev Circular",
`(orig) «малороссийского языка не было, нет и быть не может»
(ua) «малоросійської мови не було...»
(en) "language does not exist"`],

["Ems Ukaz",
`(orig) «не допускать ввоза книг»
(ua) «заборонити книги»
(en) "ban books"`],

["USSR policy",
`(orig) «русский язык — язык межнационального общения»
(ua) «російська — мова спілкування»
(en) "Russian is common language"`],

["End of Ukrainization",
`(orig) «прекратить украинизацию»
(ua) «припинити»
(en) "stop Ukrainization"`],

["Anti-nationalism",
`(orig) «бороться с национализмом»
(ua) «боротися»
(en) "fight nationalism"`]
]
},

de:{
terms:[
["Hetmanat","Kosakenstaat."],
["UNR","Ukrainische Volksrepublik."],
["Zentralrat","Politisches Zentrum 1917."],
["Akt der Vereinigung","Einheit der Ukraine."],
["Ukrainisierung","Kulturelle Wiederbelebung."],
["Kollektivierung","Zwangsreformen."],
["Waluew-Zirkular","Sprachverbot."],
["Ems-Erlass","Kulturverbot."]
],
docs:[
["Waluew-Zirkular",
`(orig) «малороссийского языка не было...»
(de) „Die Sprache existiert nicht“
(en) "does not exist"`],

["Ems-Erlass",
`(orig) «не допускать книг»
(de) „Bücher verbieten“
(en) "ban books"`],

["UdSSR Politik",
`(orig) «русский язык...»
(de) „Russisch = Hauptsprache“
(en) "main language"`],

["Ende Ukrainisierung",
`(orig) «прекратить украинизацию»
(de) „beenden“
(en) "stop"`],

["Anti-Nationalismus",
`(orig) «бороться»
(de) „kämpfen“
(en) "fight"`]
]
}
};

let lang="ua";
let ti=0;
let di=0;

function setLang(l,btn){
lang=l; ti=0; di=0;
document.querySelectorAll('.lang-trigger').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
render();
}

function nextTerm(){ti=(ti+1)%db[lang].terms.length; render();}
function nextDoc(){di=(di+1)%db[lang].docs.length; render();}

function render(){
let t=db[lang].terms[ti];
document.getElementById("g-title").innerText=t[0];
document.getElementById("g-desc").innerText=t[1];

let d=db[lang].docs[di];
document.getElementById("d-title").innerText=d[0];
document.getElementById("d-desc").innerText=d[1];
}

render();
</script>

</body>
</html>
