                    {t: "Kyjiw vs. Moskau", d: "Historische Daten bestätigen, dass Kyjiw lange vor der Gründung Moskaus im Jahr 1147 ein etabliertes Zentrum der Zivilisation und des Christentums war."}
                ],
                timeline: [
                    {date: "1654", title: "Perejaslawer Artikel", desc: "Beginn der schrittweisen Eingliederung der Ukraine in das Zarentum Moskau durch die Einschränkung der Kosakenrechte."},
                    {date: "1709", title: "Tragödie von Baturyn", desc: "Zerstörung der Hetman-Hauptstadt und Massenmord an Zivilisten als Rache für Masepas Bündnis mit Schweden."},
                    {date: "1775", title: "Zerstörung der Sitsch", desc: "Endgültige Liquidation der kosakischen Autonomie und ihres Militärsystems auf Befehl von Katharina II."},
                    {date: "1876", title: "Emser Erlass", desc: "Vollständige Verdrängung der ukrainischen Sprache aus der Öffentlichkeit, Wissenschaft und dem Druckwesen auf Gesetzesebene."},
                    {date: "1918", title: "Schlacht bei Kruty", desc: "Heroischer Widerstand der ukrainischen Jugend gegen die auf Kyjiw vorrückende bolschewistische Invasion."},
                    {date: "1932-33", title: "Holodomor", desc: "Ein Völkermord zur physischen Vernichtung der ukrainischen Bauernschaft und zur Unterdrückung des nationalen Geistes."},
                    {date: "1991", title: "Wiederherstellung der Unabhängigkeit", desc: "Austritt aus der UdSSR und Rückkehr zum souveränen Status nach Jahrzehnten der Besatzung."},
                    {date: "2014", title: "Krim-Okkupation", desc: "Beginn der modernen russischen bewaffneten Aggression und Verletzung des Völkerrechts."},
                    {date: "2022", title: "Große Invasion", desc: "Die moderne Phase einer jahrhundertelangen Politik: der Versuch, die ukrainische Staatlichkeit endgültig zu vernichten."}
                ]
            }
        };

        let curL = 'ua', tI = 0, qI = 0, pI = 0;

        function updateLang(l, b) {
            curL = l; tI = 0; qI = 0; pI = 0;
            document.querySelectorAll('.lang-trigger').forEach(x => x.classList.remove('active'));
            b.classList.add('active');

            document.getElementById('label-terms').innerText = db[l].lTerms;
            document.getElementById('label-docs').innerText = db[l].lDocs;
            document.getElementById('label-prop').innerText = db[l].lProp;
            
            document.getElementById('hint-terms').innerText = db[l].hHint;
            document.getElementById('hint-docs').innerText = db[l].hHint;
            document.getElementById('hint-prop').innerText = db[l].hHint;

            document.getElementById('q-orig-label').innerText = db[l].lOrig;
            document.getElementById('q-trans-label').innerText = db[l].lTrans;
            
            document.getElementById('l-header').innerText = db[l].lHeader;
            document.getElementById('cta-text').innerText = db[l].cta;

            nextTerm(); nextQuote(); nextProp(); renderL();
        }

        function nextTerm() {
            const b = document.getElementById('term-box');
            b.classList.remove('animate-flux'); void b.offsetWidth; b.classList.add('animate-flux');
            const i = db[curL].glossary[tI];
            document.getElementById('term-title').innerText = i.t;
            document.getElementById('term-desc').innerText = i.d;
            tI = (tI + 1) % db[curL].glossary.length;
        }

        function nextQuote() {
            const b = document.getElementById('quote-box');
            b.classList.remove('animate-flux'); void b.offsetWidth; b.classList.add('animate-flux');
            const i = db[curL].quotes[qI];
            document.getElementById('quote-title').innerText = i.t;
            document.getElementById('quote-orig').innerText = i.o;
            document.getElementById('quote-trans').innerText = i.tr;
            qI = (qI + 1) % db[curL].quotes.length;
        }

        function nextProp() {
            const b = document.getElementById('prop-box');
            b.classList.remove('animate-flux'); void b.offsetWidth; b.classList.add('animate-flux');
            const i = db[curL].propaganda[pI];
            document.getElementById('prop-title').innerText = i.t;
            document.getElementById('prop-desc').innerText = i.d;
            pI = (pI + 1) % db[curL].propaganda.length;
        }

        function renderL() {
            const c = document.getElementById('l-container'); c.innerHTML = '';
            db[curL].timeline.forEach(i => {
                c.innerHTML += `<details class="loop-item animate-flux"><summary>${i.date} — ${i.title}</summary><div class="loop-content">${i.desc}</div></details>`;
            });
        }

        window.onload = () => { updateLang('ua', document.querySelector('.lang-trigger.active')); };
    </script>
</body>
</html>
