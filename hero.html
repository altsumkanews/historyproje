<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Ivan Mazepa - Hero of Ukraine</title>
    <style>
        :root { --gold: #ffd700; --dark: #121212; --card: #1e1e1e; }
        body { background: var(--dark); color: #e0e0e0; font-family: 'Georgia', serif; margin: 0; padding-bottom: 50px; }
        .lang-nav { text-align: center; padding: 20px; background: #000; position: sticky; top: 0; z-index: 100; }
        .lang-btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 5px 15px; cursor: pointer; border-radius: 5px; margin: 0 5px; }
        .lang-btn.active { background: var(--gold); color: black; }
        
        .hero-section { height: 60vh; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://upload.wikimedia.org/wikipedia/commons/e/e0/Ivan_Mazepa.jpg') center/cover; display: flex; align-items: center; justify-content: center; text-align: center; border-bottom: 3px solid var(--gold); }
        .content { max-width: 850px; margin: 40px auto; padding: 20px; }
        .achievement-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 30px 0; }
        .ach-card { background: var(--card); padding: 20px; border-radius: 15px; border-left: 4px solid var(--gold); }
        h1, h2 { font-family: 'Times New Roman', serif; color: var(--gold); }
    </style>
</head>
<body>
    <div class="lang-nav">
        <button class="lang-btn active" onclick="chL('ua')">UA</button>
        <button class="lang-btn" onclick="chL('en')">EN</button>
        <button class="lang-btn" onclick="chL('de')">DE</button>
    </div>

    <div class="hero-section">
        <div>
            <h1 id="hero-name" style="font-size: 4em; margin: 0;">Іван Мазепа</h1>
            <p id="hero-title" style="font-size: 1.5em; font-style: italic;">Гетьман, що обрав волю</p>
        </div>
    </div>

    <div class="content">
        <h2 id="why-title">Чому він важливий?</h2>
        <p id="why-text">Іван Мазепа був першим політиком, який усвідомив: шлях України лежить до Європи, а не до Московського деспотизму.</p>
        
        <div class="achievement-grid" id="achievements"></div>

        <div style="background: #252525; padding: 30px; border-radius: 20px; margin-top: 40px;">
            <h2 id="loop-title">The Historical Loop</h2>
            <p id="loop-text"></p>
        </div>
    </div>

    <script>
        const data = {
            ua: {
                name: "Іван Мазепа", title: "Гетьман, що обрав волю", whyT: "Чому він важливий?",
                whyD: "Мазепа — це символ європейського вибору України. Він був одним із найбагатших та найосвіченіших людей свого часу, меценатом, який збудував десятки соборів.",
                loopT: "Історична паралель",
                loopD: "Як і сьогодні, 300 років тому Росія намагалася знищити українську автономію. Мазепа пішов на ризик заради свободи, за що отримав 'анафему' від Москви, але здобув вічне місце в серці України.",
                achs: [
                    ["Меценатство", "Побудував понад 20 церков та підтримував Могилянку."],
                    ["Дипломатія", "Створив потужний союз зі Швецією проти імперії."],
                    ["Культура", "Золотий вік українського бароко названо 'мазепинським'."],
                    ["Спротив", "Пожертвував багатством заради ідеї незалежності."]
                ]
            },
            en: {
                name: "Ivan Mazepa", title: "The Hetman Who Chose Freedom", whyT: "Why is he important?",
                whyD: "Mazepa is the symbol of Ukraine's European choice. He was one of the wealthiest and most educated leaders of his time, a patron who built dozens of cathedrals.",
                loopT: "Historical Parallel",
                loopD: "Just like today, 300 years ago Russia tried to destroy Ukrainian autonomy. Mazepa took a risk for freedom, receiving 'anathema' from Moscow but earning an eternal place in the heart of Ukraine.",
                achs: [
                    ["Patronage", "Built over 20 churches and supported the Kyiv-Mohyla Academy."],
                    ["Diplomacy", "Formed a powerful alliance with Sweden against the Empire."],
                    ["Culture", "The Golden Age of Ukrainian Baroque is named 'Mazepian'."],
                    ["Resistance", "Sacrificed wealth for the idea of independence."]
                ]
            },
            de: {
                name: "Iwan Masepa", title: "Der Hetman, der die Freiheit wählte", whyT: "Warum ist er wichtig?",
                whyD: "Masepa ist das Symbol für die europäische Entscheidung der Ukraine. Er war einer der reichsten und gebildetsten Anführer seiner Zeit und ein Mäzen.",
                loopT: "Historische Parallele",
                loopD: "Wie heute versuchte Russland vor 300 Jahren, die ukrainische Autonomie zu zerstören. Masepa riskierte alles für die Freiheit und bleibt ein ewiges Symbol des Widerstands.",
                achs: [
                    ["Mäzenatentum", "Baute über 20 Kirchen und unterstützte die Kyjiwer Akademie."],
                    ["Diplomatie", "Schloss ein Bündnis mit Schweden gegen das Russische Reich."],
                    ["Kultur", "Das Goldene Zeitalter des Barocks wird 'Masepa-Barock' genannt."],
                    ["Widerstand", "Opferte Reichtum für die Idee der Unabhängigkeit."]
                ]
            }
        };

        function chL(l) {
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            const d = data[l];
            document.getElementById('hero-name').innerText = d.name;
            document.getElementById('hero-title').innerText = d.title;
            document.getElementById('why-title').innerText = d.whyT;
            document.getElementById('why-text').innerText = d.whyD;
            document.getElementById('loop-title').innerText = d.loopT;
            document.getElementById('loop-text').innerText = d.loopD;
            
            const ac = document.getElementById('achievements');
            ac.innerHTML = '';
            d.achs.forEach(a => {
                ac.innerHTML += `<div class="ach-card"><h3>${a[0]}</h3><p>${a[1]}</p></div>`;
            });
        }
        window.onload = () => chL('ua');
    </script>
</body>
</html>
