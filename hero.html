<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Ivan Mazepa - The Historical Loop</title>
    <link rel="stylesheet" href="https://altsumkanews.github.io/historyproje/assets/css/style.css?v=a0ba884548820066dfadd8416036abba">
    <style>
        :root { --ua-gold: #ffd700; --card-bg: #1e1e1e; }
        body { background: #121212; color: #e0e0e0; }
        .top { padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; background: rgba(18,18,18,0.95); border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 900; color: #fff; text-decoration: none; }
        .hero-header { height: 45vh; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://upload.wikimedia.org/wikipedia/commons/e/e0/Ivan_Mazepa.jpg') center/cover; display: flex; align-items: center; justify-content: center; text-align: center; border-bottom: 2px solid var(--ua-gold); }
        .container { max-width: 850px; margin: -40px auto 60px; background: var(--card-bg); padding: 40px; border-radius: 20px; border: 1px solid #333; position: relative; }
        .lang-btns { text-align: center; margin-bottom: 20px; }
        .l-btn { background: transparent; border: 1px solid var(--ua-gold); color: var(--ua-gold); padding: 5px 15px; border-radius: 5px; cursor: pointer; margin: 0 5px; }
        .l-btn.active { background: var(--ua-gold); color: #000; }
        .ach-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 30px 0; }
        .ach-card { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 12px; border-left: 4px solid var(--ua-gold); }
        h1, h2 { color: var(--ua-gold); }
        .navbar__menu { display: flex; list-style: none; gap: 20px; margin: 0; }
        .navbar__menu a { color: white; text-decoration: none; font-size: 0.9em; font-weight: 600; }
    </style>
</head>
<body>
    <header class="top">
        <a class="logo" href="index.html">History Project</a>
        <nav><ul class="navbar__menu"><li><a href="index.html">Головна</a></li><li><a href="sources.html">Джерела</a></li></ul></nav>
    </header>

    <div class="hero-header">
        <h1 id="h-name" style="font-size: 3.5em;">Іван Мазепа</h1>
    </div>

    <main class="container">
        <div class="lang-btns">
            <button class="l-btn active" onclick="chL('ua', this)">UA</button>
            <button class="l-btn" onclick="chL('en', this)">EN</button>
            <button class="l-btn" onclick="chL('de', this)">DE</button>
        </div>
        <p id="h-desc" style="font-size: 1.2em; line-height: 1.8; opacity: 0.9;"></p>
        <div class="ach-grid" id="ach-list"></div>
    </main>

    <script>
        /* Скопіюй сюди об'єкт data та функцію chL з попереднього коду для сторінки постаті */
    </script>
</body>
</html>
